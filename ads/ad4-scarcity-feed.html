<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Ad 4: Scarcity — Feed</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { margin: 0; padding: 0; width: 1080px; height: 1080px; overflow: hidden; }

  .ad {
    position: relative;
    overflow: hidden;
    width: 1080px;
    height: 1080px;
  }

  .ad img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    top: 0; left: 0;
  }

  .overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(180deg, rgba(45,79,79,0.15) 0%, rgba(45,79,79,0.5) 40%, rgba(45,79,79,0.88) 100%);
    z-index: 1;
  }

  .content {
    position: absolute;
    z-index: 2;
    color: #fff;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    top: 0; left: 0; right: 0; bottom: 0;
    padding: 60px 72px 80px;
  }

  .studio-name {
    font-family: 'Montserrat', sans-serif;
    font-size: 32px;
    font-weight: 600;
    letter-spacing: 10px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.7);
    margin-bottom: 18px;
  }

  .hook {
    font-family: 'Cormorant Garamond', serif;
    font-size: 80px;
    font-weight: 400;
    line-height: 1.25;
    margin-bottom: 24px;
    color: #fff;
  }

  .divider {
    width: 104px;
    height: 4px;
    background: #C4A862;
    margin-bottom: 24px;
  }

  .details {
    font-family: 'Montserrat', sans-serif;
    font-size: 32px;
    font-weight: 500;
    color: rgba(255,255,255,0.85);
    line-height: 1.5;
  }
</style>
</head>
<body>
<div class="ad">
  <img src="../images/img2.jpg" alt="">
  <div class="overlay"></div>
  <div class="content">
    <div class="studio-name">Sol Solace Studio</div>
    <div class="hook">Early bird is gone.<br>A few spots remain.</div>
    <div class="divider"></div>
    <div class="details">3 luxury cabins · 1 field cabin · Limited commuter passes<br><br>El Salto Sagrado · April 10–12 · Paige, TX</div>
  </div>
</div>
</body>
</html>
