<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px;
  height: 1440px;
  position: relative;
  overflow: hidden;
  font-family: 'Cormorant Garamond', serif;
}
.bg {
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  background: url('../../images/img6.jpg') center center / cover no-repeat;
}
.overlay {
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  background: linear-gradient(
    180deg,
    rgba(25, 40, 38, 0.4) 0%,
    rgba(25, 40, 38, 0.6) 40%,
    rgba(25, 40, 38, 0.8) 100%
  );
}
.content {
  position: relative;
  z-index: 2;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 80px;
  text-align: center;
}
.studio-name {
  position: absolute;
  top: 60px;
  left: 80px;
  font-family: 'Montserrat', sans-serif;
  font-weight: 500;
  font-size: 20px;
  letter-spacing: 5px;
  color: rgba(255,255,255,0.7);
  text-transform: uppercase;
}
.comment-label {
  font-family: 'Montserrat', sans-serif;
  font-weight: 400;
  font-size: 26px;
  letter-spacing: 4px;
  color: #C4A862;
  text-transform: uppercase;
  margin-bottom: 30px;
}
.ready {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 600;
  font-size: 140px;
  color: #FAF8F3;
  letter-spacing: 8px;
  text-transform: uppercase;
  margin-bottom: 20px;
}
.divider {
  width: 100px;
  height: 2px;
  background: #C4A862;
  margin: 30px 0;
}
.body-text {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 42px;
  color: #FAF8F3;
  line-height: 1.5;
  margin-bottom: 50px;
  opacity: 0.9;
}
.winner-box {
  border: 2px solid #C4A862;
  padding: 30px 60px;
  margin-top: 20px;
}
.winner-text {
  font-family: 'Montserrat', sans-serif;
  font-weight: 500;
  font-size: 22px;
  letter-spacing: 3px;
  color: #C4A862;
  text-transform: uppercase;
}
.winner-date {
  font-family: 'Cormorant Garamond', serif;
  font-size: 40px;
  color: #FAF8F3;
  margin-top: 10px;
}
.bottom-note {
  position: absolute;
  bottom: 60px;
  font-family: 'Montserrat', sans-serif;
  font-weight: 300;
  font-size: 20px;
  color: rgba(255,255,255,0.6);
  letter-spacing: 2px;
}
</style>
</head>
<body>
<div class="bg"></div>
<div class="overlay"></div>
<div class="content">
  <div class="studio-name">Sol Solace Studio</div>
  <div class="comment-label">Comment below</div>
  <div class="ready">Ready</div>
  <div class="divider"></div>
  <div class="body-text">and we'll send you the<br>retreat link directly</div>
  <div class="winner-box">
    <div class="winner-text">Winner Announced</div>
    <div class="winner-date">April 1, 2026</div>
  </div>
  <div class="bottom-note">El Salto Sagrado  ·  April 10-12  ·  Serana, Paige TX</div>
</div>
</body>
</html>
