<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px;
  height: 1920px;
  background: #2D4F4F;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Cormorant Garamond', serif;
  position: relative;
  overflow: hidden;
}
.studio-name {
  position: absolute;
  top: 80px;
  font-family: 'Montserrat', sans-serif;
  font-weight: 500;
  font-size: 24px;
  letter-spacing: 6px;
  color: rgba(250, 248, 243, 0.4);
  text-transform: uppercase;
}
.content {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 0 100px;
}
.hook-text {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 400;
  font-size: 80px;
  line-height: 1.3;
  color: #FAF8F3;
}
.sub-text {
  margin-top: 80px;
  font-family: 'Montserrat', sans-serif;
  font-weight: 400;
  font-size: 32px;
  color: #C4A862;
  letter-spacing: 2px;
}
</style>
</head>
<body>
  <div class="studio-name">Sol Solace Studio</div>
  <div class="content">
    <div class="hook-text">
      You don't need<br>
      a full weekend<br>
      to begin again.
    </div>
    <div class="sub-text">This Saturday</div>
  </div>
</body>
</html>
