<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px;
  height: 1920px;
  background: #FAF8F3;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Cormorant Garamond', serif;
  position: relative;
  overflow: hidden;
}
.studio-name {
  position: absolute;
  top: 80px;
  font-family: 'Montserrat', sans-serif;
  font-weight: 500;
  font-size: 24px;
  letter-spacing: 6px;
  color: #8A8578;
  text-transform: uppercase;
}
.title {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 600;
  font-size: 64px;
  color: #2D4F4F;
  margin-bottom: 60px;
}
.divider {
  width: 120px;
  height: 2px;
  background: #C4A862;
  margin-bottom: 60px;
}
.details {
  font-family: 'Montserrat', sans-serif;
  font-weight: 300;
  font-size: 36px;
  line-height: 2.2;
  color: #2D4F4F;
  text-align: center;
}
.details strong {
  font-weight: 500;
}
</style>
</head>
<body>
  <div class="studio-name">Sol Solace Studio</div>
  <div class="content" style="display:flex;flex-direction:column;align-items:center;padding:0 100px;">
    <div class="title">Saturday Immersion</div>
    <div class="divider"></div>
    <div class="details">
      Sunrise to after dark<br>
      Movement + guided sessions<br>
      Guest speakers<br>
      1:1 bodywork available<br>
      Sauna + saltwater pool<br>
      Light meals + catered dinner<br>
      Evening fire ceremony
    </div>
  </div>
</body>
</html>
