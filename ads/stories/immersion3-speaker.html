<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px;
  height: 1920px;
  background: #2D4F4F;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Cormorant Garamond', serif;
  position: relative;
  overflow: hidden;
}
.studio-name {
  position: absolute;
  top: 80px;
  font-family: 'Montserrat', sans-serif;
  font-weight: 500;
  font-size: 24px;
  letter-spacing: 6px;
  color: rgba(250, 248, 243, 0.4);
  text-transform: uppercase;
}
.content {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 0 100px;
}
.label {
  font-family: 'Montserrat', sans-serif;
  font-weight: 500;
  font-size: 28px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: #C4A862;
  margin-bottom: 50px;
}
.speaker-name {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 400;
  font-size: 72px;
  line-height: 1.3;
  color: #FAF8F3;
  margin-bottom: 50px;
}
.divider {
  width: 120px;
  height: 2px;
  background: #C4A862;
  margin-bottom: 50px;
}
.desc {
  font-family: 'Montserrat', sans-serif;
  font-weight: 300;
  font-size: 32px;
  line-height: 1.7;
  color: rgba(250, 248, 243, 0.85);
}
</style>
</head>
<body>
  <div class="studio-name">Sol Solace Studio</div>
  <div class="content">
    <div class="label">Guest Speaker</div>
    <div class="speaker-name">TK Tunchez</div>
    <div class="divider"></div>
    <div class="desc">
      Sovereignty coach +<br>
      cultural strategist.<br><br>
      Guiding an exploration<br>
      of burnout, release, and<br>
      the path back to self.
    </div>
  </div>
</body>
</html>
