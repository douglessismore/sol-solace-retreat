<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px;
  height: 1920px;
  background: #FAF8F3;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Cormorant Garamond', serif;
  position: relative;
  overflow: hidden;
}
.studio-name {
  position: absolute;
  top: 80px;
  font-family: 'Montserrat', sans-serif;
  font-weight: 500;
  font-size: 24px;
  letter-spacing: 6px;
  color: #8A8578;
  text-transform: uppercase;
}
.content {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 0 100px;
}
.headline {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 400;
  font-size: 72px;
  line-height: 1.3;
  color: #2D4F4F;
}
.divider {
  width: 120px;
  height: 2px;
  background: #C4A862;
  margin: 60px 0;
}
.price {
  font-family: 'Montserrat', sans-serif;
  font-weight: 600;
  font-size: 72px;
  color: #2D4F4F;
  margin-bottom: 20px;
}
.date {
  font-family: 'Montserrat', sans-serif;
  font-weight: 400;
  font-size: 36px;
  color: #2D4F4F;
  margin-bottom: 10px;
}
.location {
  font-family: 'Montserrat', sans-serif;
  font-weight: 300;
  font-size: 30px;
  color: #8A8578;
  margin-bottom: 60px;
}
.cta {
  font-family: 'Montserrat', sans-serif;
  font-weight: 500;
  font-size: 32px;
  color: #C4A862;
  letter-spacing: 2px;
}
</style>
</head>
<body>
  <div class="studio-name">Sol Solace Studio</div>
  <div class="content">
    <div class="headline">Saturday Immersion Pass</div>
    <div class="divider"></div>
    <div class="price">$425</div>
    <div class="date">Saturday, April 11</div>
    <div class="location">Serana, Paige TX</div>
    <div class="cta">Link in bio to reserve</div>
  </div>
</body>
</html>
