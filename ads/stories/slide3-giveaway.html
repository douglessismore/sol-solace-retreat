<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px;
  height: 1920px;
  background: #FAF8F3;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Cormorant Garamond', serif;
  position: relative;
  overflow: hidden;
}
.studio-name {
  position: absolute;
  top: 80px;
  font-family: 'Montserrat', sans-serif;
  font-weight: 500;
  font-size: 24px;
  letter-spacing: 6px;
  color: #8A8578;
  text-transform: uppercase;
}
.content {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 0 100px;
}
.headline {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 400;
  font-size: 80px;
  line-height: 1.3;
  color: #2D4F4F;
}
.divider {
  width: 120px;
  height: 2px;
  background: #C4A862;
  margin: 60px 0;
}
.details {
  font-family: 'Montserrat', sans-serif;
  font-weight: 400;
  font-size: 48px;
  line-height: 1.6;
  color: #2D4F4F;
}
.small-text {
  margin-top: 60px;
  font-family: 'Montserrat', sans-serif;
  font-weight: 400;
  font-size: 32px;
  color: #8A8578;
  letter-spacing: 1px;
}
</style>
</head>
<body>
  <div class="studio-name">Sol Solace Studio</div>
  <div class="content">
    <div class="headline">We're gifting ONE person:</div>
    <div class="divider"></div>
    <div class="details">
      Retreat commuter pass<br>
      60-min session at Sol Solace
    </div>
    <div class="small-text">April 10&ndash;12 &middot; Serana, Paige TX</div>
  </div>
</body>
</html>
