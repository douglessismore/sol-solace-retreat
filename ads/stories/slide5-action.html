<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px;
  height: 1920px;
  background: #FAF8F3;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Cormorant Garamond', serif;
  position: relative;
  overflow: hidden;
}
.studio-name {
  position: absolute;
  top: 80px;
  font-family: 'Montserrat', sans-serif;
  font-weight: 500;
  font-size: 24px;
  letter-spacing: 6px;
  color: #8A8578;
  text-transform: uppercase;
}
.content {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 0 120px;
}
.headline {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 400;
  font-size: 80px;
  line-height: 1.3;
  color: #2D4F4F;
  margin-bottom: 70px;
}
.action-list {
  font-family: 'Montserrat', sans-serif;
  font-weight: 400;
  font-size: 44px;
  line-height: 2;
  color: #2D4F4F;
  text-align: left;
}
.arrow {
  color: #C4A862;
  margin-right: 12px;
}
</style>
</head>
<body>
  <div class="studio-name">Sol Solace Studio</div>
  <div class="content">
    <div class="headline">To enter:</div>
    <div class="action-list">
      <span class="arrow">&rarr;</span> Follow @solsolacestudio<br>
      <span class="arrow">&rarr;</span> Like this post<br>
      <span class="arrow">&rarr;</span> Tag 3 people<br>
      <span class="arrow">&rarr;</span> Share to your story<br>
      <span class="arrow">&rarr;</span> Comment READY
    </div>
  </div>
</body>
</html>
